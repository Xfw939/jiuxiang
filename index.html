<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>酒巷 · 精选好酒</title>
<style>
  /* 字体：优先系统字体，无需加载外部资源 */
  body { font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif; background:#f0ede8; display:flex; justify-content:center; min-height:100vh; }
  .phone { width:414px; max-width:100vw; min-height:100vh; background:var(--bg); position:relative; overflow-x:hidden; box-shadow:0 0 0 1px #ddd,0 20px 60px rgba(0,0,0,.3); display:flex; flex-direction:column; }
  .statusbar { height:32px; background:#1a1a1a; display:flex; align-items:center; justify-content:space-between; padding:0 18px; color:#fff; font-size:11px; flex-shrink:0; }
  .navbar { position:sticky; top:0; z-index:50; background:linear-gradient(135deg,#1a1a1a,#2d1f0e); padding:12px 18px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
  .navbar .back-btn { background:none; border:none; color:#fff; font-size:20px; cursor:pointer; display:none; }
  .navbar .title { font-family:'STSong','Songti SC','Noto Serif SC',serif; font-size:19px; font-weight:900; color:var(--gold); letter-spacing:3px; flex:1; }
  .navbar .nav-icon { background:none; border:none; color:#fff; font-size:22px; cursor:pointer; padding:4px; position:relative; }
  .nav-icon .badge { position:absolute; top:-2px; right:-4px; background:var(--red); color:#fff; font-size:10px; font-weight:700; width:18px; height:18px; border-radius:50%; display:none; align-items:center; justify-content:center; }
  .page { display:none; flex:1; overflow-y:auto; }
  .page.active { display:block; }
  .search-bar { margin:12px 16px; display:flex; align-items:center; background:#fff; border-radius:24px; padding:10px 16px; box-shadow:0 2px 12px rgba(0,0,0,.06); }
  .search-bar input { flex:1; border:none; outline:none; font-size:14px; font-family:inherit; background:transparent; }
  .banner { margin:0 16px 14px; height:150px; border-radius:14px; background:linear-gradient(135deg,#2d1f0e,#4a3520,#1a1a1a); position:relative; overflow:hidden; color:#fff; display:flex; align-items:center; padding:0 28px; box-shadow:0 4px 24px rgba(0,0,0,.2); }
  .banner::after { content:''; position:absolute; right:-30px; top:-40px; width:200px; height:240px; border-radius:50%; background:rgba(201,169,110,.08); }
  .banner-text { position:relative; z-index:1; }
  .banner-text .b-title { font-family:'STSong','Songti SC','Noto Serif SC',serif; font-size:26px; font-weight:900; letter-spacing:2px; line-height:1.3; }
  .banner-text .b-sub { font-size:13px; opacity:.6; margin-top:6px; letter-spacing:1px; }
  .cats { display:flex; gap:10px; padding:0 16px 14px; overflow-x:auto; scrollbar-width:none; }
  .cats::-webkit-scrollbar { display:none; }
  .cat-chip { flex-shrink:0; padding:8px 18px; border-radius:20px; font-size:13px; font-weight:600; cursor:pointer; background:#fff; color:#666; border:1px solid transparent; transition:all .25s; white-space:nowrap; box-shadow:0 1px 4px rgba(0,0,0,.04); }
  .cat-chip.active { background:#1a1a1a; color:var(--gold); border-color:var(--gold); }
  .sec-title { display:flex; align-items:center; gap:8px; padding:6px 16px 12px; font-size:17px; font-weight:700; font-family:'STSong','Songti SC','Noto Serif SC',serif; }
  .sec-title::before { content:''; width:4px; height:18px; background:var(--gold); border-radius:2px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 16px 20px; }
  .product-card { background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,.06); cursor:pointer; transition:transform .2s; }
  .product-card:active { transform:scale(.97); }
  .product-card .img { height:170px; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
  .product-card .tag { position:absolute; top:8px; left:8px; background:var(--red); color:#fff; font-size:10px; padding:2px 8px; border-radius:4px; font-weight:600; z-index:2; }
  .product-card .info { padding:12px 14px 14px; }
  .product-card .name { font-size:14px; font-weight:600; color:var(--text); line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .product-card .meta { font-size:11px; color:var(--text-light); margin:4px 0 8px; }
  .product-card .price-row { display:flex; align-items:baseline; justify-content:space-between; }
  .product-card .price { font-size:22px; font-weight:900; color:var(--red); font-family:'STSong','Songti SC','Noto Serif SC',serif; }
  .product-card .add-btn { width:30px; height:30px; border-radius:50%; background:var(--gold); color:#fff; border:none; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
  .product-card .add-btn:active { transform:scale(.85); background:var(--gold-dark); }

  /* ===== CSS Bottles ===== */
  .bottle-wrap { position:relative; width:90px; height:142px; display:flex; flex-direction:column; align-items:center; z-index:1; }
  .bottle-body { width:62px; height:100px; border-radius:12px 12px 5px 5px; position:relative; overflow:hidden; box-shadow:inset 2px 0 8px rgba(255,255,255,.25),inset -2px 0 6px rgba(0,0,0,.15),0 6px 18px rgba(0,0,0,.18); }
  .bottle-body::after { content:''; position:absolute; left:5px; top:0; width:12px; height:100%; background:linear-gradient(90deg,rgba(255,255,255,.45) 0%,rgba(255,255,255,.06) 100%); border-radius:50%; }
  .bottle-label { position:absolute; left:6px; right:6px; top:28px; bottom:20px; border-radius:5px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:4px; box-shadow:0 1px 3px rgba(0,0,0,.2); }
  .bottle-label .bl-brand { font-size:8px; font-weight:900; letter-spacing:2px; text-align:center; line-height:1.2; }
  .bottle-label .bl-type { font-size:6px; font-weight:500; opacity:.8; margin-top:1px; letter-spacing:1px; }
  .bottle-label .bl-alc { font-size:7px; font-weight:700; margin-top:2px; }
  .bottle-neck { width:24px; height:20px; border-radius:3px 3px 0 0; box-shadow:inset 2px 0 6px rgba(255,255,255,.2),inset -1px 0 4px rgba(0,0,0,.1); }
  .bottle-cap { width:28px; height:14px; border-radius:4px 4px 2px 2px; box-shadow:0 -1px 3px rgba(0,0,0,.2),inset 0 1px 2px rgba(255,255,255,.2); }
  /* 茅台白瓷瓶 */
  .b-maotai .bottle-body { background:linear-gradient(180deg,#fafaf5,#f0ece2 15%,#e8e3d5 50%,#ddd8c8); }
  .b-maotai .bottle-label { background:linear-gradient(180deg,#c41e2a,#a01822); color:#fff; }
  .b-maotai .bottle-label .bl-brand { color:#ffd700; font-size:9px; }
  .b-maotai .bottle-neck { background:linear-gradient(180deg,#f5f0e8,#e0d8c8); }
  .b-maotai .bottle-cap { background:linear-gradient(180deg,#c41e2a,#8b0000); }
  /* 五粮液水晶瓶 */
  .b-wuliangye .bottle-body { background:linear-gradient(180deg,rgba(255,255,255,.75),rgba(225,225,238,.55),rgba(255,255,255,.75)); border:1px solid rgba(200,200,215,.5); }
  .b-wuliangye .bottle-label { background:linear-gradient(180deg,#d4213d,#aa1830); color:#fff; }
  .b-wuliangye .bottle-label .bl-brand { color:#ffd700; }
  .b-wuliangye .bottle-neck { background:rgba(255,255,255,.8); border:1px solid rgba(200,200,215,.3); border-bottom:none; }
  .b-wuliangye .bottle-cap { background:linear-gradient(180deg,#d4213d,#8b1525); }
  /* 剑南春水晶瓶 */
  .b-jiannanchun .bottle-body { background:linear-gradient(180deg,rgba(215,220,238,.9),rgba(195,205,228,.7),rgba(215,220,238,.9)); border:1px solid rgba(175,185,210,.4); }
  .b-jiannanchun .bottle-label { background:linear-gradient(180deg,#c8102e,#9a0c22); color:#fff; }
  .b-jiannanchun .bottle-label .bl-brand { color:#ffd700; }
  .b-jiannanchun .bottle-neck { background:rgba(215,220,238,.9); border:1px solid rgba(175,185,210,.3); border-bottom:none; }
  .b-jiannanchun .bottle-cap { background:linear-gradient(180deg,#c8102e,#7a0818); }
  /* 郎酒红瓶 */
  .b-langjiu .bottle-body { background:linear-gradient(180deg,#d4212a,#b81c24,#8b1318); }
  .b-langjiu .bottle-label { background:rgba(0,0,0,.5); color:#ffd700; }
  .b-langjiu .bottle-label .bl-brand { color:#ffd700; }
  .b-langjiu .bottle-neck { background:linear-gradient(180deg,#c41e2a,#a01822); }
  .b-langjiu .bottle-cap { background:linear-gradient(180deg,#ffd700,#c8a020); }
  /* 红酒瓶 */
  .b-wine .bottle-body { width:56px; height:105px; border-radius:5px; background:linear-gradient(180deg,#152d15,#0a180a,#152815); }
  .b-wine .bottle-label { background:linear-gradient(180deg,#f5f0e8,#e8e0d0); color:#333; }
  .b-wine .bottle-label .bl-brand { color:#6b0000; font-size:7px; }
  .b-wine .bottle-neck { width:18px; background:linear-gradient(180deg,#152d15,#0a180a); }
  .b-wine .bottle-cap { width:22px; background:linear-gradient(180deg,#2d1f0e,#1a1008); }
  /* 威士忌瓶 */
  .b-spirit .bottle-body { width:56px; height:100px; border-radius:3px; background:linear-gradient(180deg,#d4a860,#b8863a,#8b6518); }
  .b-spirit .bottle-label { background:rgba(255,255,255,.9); color:#1a1a1a; }
  .b-spirit .bottle-label .bl-brand { color:#4a3010; font-size:7px; }
  .b-spirit .bottle-neck { width:20px; height:26px; border-radius:2px; background:linear-gradient(180deg,#d4a860,#b8863a); }
  .b-spirit .bottle-cap { width:22px; background:linear-gradient(180deg,#2d1f0e,#1a1008); }
  /* 啤酒罐 */
  .b-beer .bottle-body { width:50px; height:112px; border-radius:10px 10px 4px 4px; }
  .b-beer .bottle-label { top:18px; bottom:28px; border-radius:4px; }
  .b-beer .bottle-neck { width:16px; height:7px; border-radius:2px; }
  .b-beer .bottle-cap { width:20px; height:5px; border-radius:2px; }
  /* 清酒瓶 */
  .b-sake .bottle-body { width:50px; height:108px; border-radius:5px; }
  .b-sake .bottle-label { top:32px; bottom:22px; }
  .b-sake .bottle-neck { width:18px; height:24px; }
  .b-sake .bottle-cap { width:22px; height:10px; }
  /* 礼盒 */
  .b-gift .bottle-body { width:66px; height:92px; border-radius:7px; }
  .b-gift .bottle-label { background:rgba(0,0,0,.4); color:#ffd700; }
  .b-gift .bottle-cap { background:linear-gradient(180deg,#ffd700,#c8a020); width:32px; }

  /* 详情页大瓶 */
  .bottle-wrap.large { width:150px; height:230px; }
  .bottle-wrap.large .bottle-body { width:100px; height:162px; border-radius:20px 20px 10px 10px; }
  .bottle-wrap.large .bottle-label { left:10px; right:10px; top:46px; bottom:34px; border-radius:8px; padding:8px; }
  .bottle-wrap.large .bottle-label .bl-brand { font-size:14px; letter-spacing:3px; }
  .bottle-wrap.large .bottle-label .bl-type { font-size:10px; }
  .bottle-wrap.large .bottle-label .bl-alc { font-size:10px; }
  .bottle-wrap.large .bottle-neck { width:40px; height:32px; border-radius:5px 5px 0 0; }
  .bottle-wrap.large .bottle-cap { width:46px; height:22px; border-radius:6px 6px 2px 2px; }
  .bottle-wrap.large.b-wine .bottle-body { width:90px; }
  .bottle-wrap.large.b-wine .bottle-neck,.bottle-wrap.large.b-wine .bottle-cap { width:32px; }
  .bottle-wrap.large.b-spirit .bottle-body { width:90px; }
  .bottle-wrap.large.b-spirit .bottle-neck { width:32px; height:42px; }
  .bottle-wrap.large.b-beer .bottle-body { width:80px; height:178px; border-radius:16px 16px 6px 6px; }
  .bottle-wrap.large.b-sake .bottle-body { width:80px; }
  .bottle-wrap.large.b-sake .bottle-neck { width:28px; height:38px; }
  .bottle-wrap.large.b-gift .bottle-body { width:106px; }

  /* ===== Detail Modal ===== */
  .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.55); z-index:100; display:none; align-items:flex-end; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { width:414px; max-width:100vw; max-height:85vh; background:#fff; border-radius:20px 20px 0 0; overflow-y:auto; animation:slideUp .3s ease; }
  @keyframes slideUp { from{transform:translateY(100%);} }
  .detail-img { height:300px; display:flex; align-items:center; justify-content:center; position:relative; }
  .detail-img .close-btn { position:absolute; top:14px; right:14px; z-index:5; width:32px; height:32px; border-radius:50%; background:rgba(0,0,0,.35); color:#fff; border:none; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .detail-body { padding:20px 18px 30px; }
  .detail-name { font-size:20px; font-weight:700; line-height:1.4; margin-bottom:8px; }
  .detail-meta { font-size:12px; color:#999; margin-bottom:14px; }
  .detail-price { font-size:34px; font-weight:900; color:var(--red); font-family:'STSong','Songti SC','Noto Serif SC',serif; margin-bottom:6px; }
  .detail-orig { font-size:13px; color:#bbb; text-decoration:line-through; }
  .detail-desc { font-size:14px; color:#666; line-height:1.8; margin:16px 0; padding-top:14px; border-top:1px solid #f0f0f0; }
  .detail-actions { display:flex; gap:10px; }
  .btn-buy { flex:1; padding:14px; border:none; border-radius:24px; font-size:15px; font-weight:700; cursor:pointer; letter-spacing:1px; font-family:inherit; transition:all .2s; }
  .btn-buy.cart { background:#f0ede8; color:#333; }
  .btn-buy.cart:active { background:#ddd; }
  .btn-buy.now { background:var(--gold); color:#fff; }
  .btn-buy.now:active { background:var(--gold-dark); }

  /* ===== Cart Drawer ===== */
  .cart-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.55); z-index:200; display:none; align-items:flex-end; justify-content:center; }
  .cart-overlay.open { display:flex; }
  .cart-drawer { width:414px; max-width:100vw; max-height:70vh; background:#fff; border-radius:20px 20px 0 0; display:flex; flex-direction:column; animation:slideUp .3s ease; }
  .cart-head { display:flex; align-items:center; justify-content:space-between; padding:18px 20px; border-bottom:1px solid #f0f0f0; font-size:17px; font-weight:700; }
  .cart-items { flex:1; overflow-y:auto; padding:10px 0; max-height:280px; }
  .cart-item { display:flex; align-items:center; gap:12px; padding:14px 20px; border-bottom:1px solid #f8f8f8; }
  .cart-item .ci-img { width:50px; height:80px; display:flex; align-items:center; justify-content:center; flex-shrink:0; transform:scale(.55); }
  .cart-item .ci-info { flex:1; }
  .cart-item .ci-name { font-size:14px; font-weight:600; }
  .cart-item .ci-price { font-size:16px; font-weight:700; color:var(--red); }
  .cart-item .qty-ctrl { display:flex; align-items:center; gap:8px; }
  .cart-item .qty-ctrl button { width:26px; height:26px; border-radius:50%; border:1px solid #ddd; background:#fff; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .cart-foot { padding:16px 20px; border-top:1px solid #f0f0f0; }
  .cart-foot .total { display:flex; justify-content:space-between; font-size:18px; font-weight:700; margin-bottom:12px; }
  .cart-foot .total .amt { color:var(--red); font-size:24px; }
  .btn-checkout { width:100%; padding:14px; background:var(--gold); color:#fff; border:none; border-radius:24px; font-size:16px; font-weight:700; cursor:pointer; letter-spacing:2px; font-family:inherit; }

  /* Misc */
  .checkout-sec { background:#fff; margin:0 16px 14px; border-radius:12px; padding:18px; box-shadow:0 2px 8px rgba(0,0,0,.04); }
  .checkout-sec .sec-label { font-size:13px; font-weight:700; color:#999; letter-spacing:2px; margin-bottom:12px; }
  .form-input { width:100%; padding:12px; border:1px solid #e0e0e0; border-radius:8px; font-size:14px; font-family:inherit; outline:none; margin-bottom:10px; background:#fafafa; transition:border .2s; }
  .form-input:focus { border-color:var(--gold); background:#fff; }
  .order-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid #f8f8f8; font-size:13px; }
  .order-item .oi-name { flex:1; }
  .order-item .oi-price { font-weight:600; color:var(--red); white-space:nowrap; }
  .pay-option { display:flex; align-items:center; gap:12px; padding:14px; border:2px solid #eee; border-radius:12px; cursor:pointer; margin-bottom:8px; transition:all .2s; }
  .pay-option.active { border-color:var(--gold); background:#fdfaf5; }
  .pay-option .pay-radio { width:20px; height:20px; border-radius:50%; border:2px solid #ccc; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .pay-option.active .pay-radio { border-color:var(--gold); }
  .pay-option.active .pay-radio::after { content:''; width:10px; height:10px; border-radius:50%; background:var(--gold); }
  .pay-option .pay-label { font-size:15px; font-weight:600; }
  .pay-option .pay-icon { font-size:28px; }
  .qr-section { text-align:center; padding:30px 20px; }
  .qr-box { width:220px; height:220px; margin:0 auto 16px; border:1px solid #eee; border-radius:12px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .qr-box img { width:100%; height:100%; object-fit:contain; }
  .qr-box .no-qr { color:#ccc; font-size:13px; text-align:center; line-height:1.8; }
  .qr-amount { font-size:28px; font-weight:900; color:var(--red); margin-bottom:6px; }
  .qr-hint { font-size:12px; color:#999; margin-bottom:16px; }
  .upload-box { border:2px dashed #ddd; border-radius:12px; padding:24px; text-align:center; cursor:pointer; transition:border .2s; }
  .upload-box:hover { border-color:var(--gold); }
  .upload-box .preview-img { max-width:100%; max-height:200px; border-radius:8px; display:none; }
  .upload-box .upload-text { color:#999; font-size:13px; }
  .btn-confirm { width:100%; padding:16px; border:none; border-radius:26px; font-size:17px; font-weight:700; cursor:pointer; letter-spacing:2px; font-family:inherit; margin-top:14px; transition:all .2s; background:var(--gold); color:#fff; }
  .btn-confirm:active { background:var(--gold-dark); }
  .btn-confirm:disabled { background:#ccc; cursor:not-allowed; }
  .order-card { background:#fff; border-radius:12px; padding:18px; margin:0 16px 12px; box-shadow:0 2px 8px rgba(0,0,0,.04); }
  .order-card .oc-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .order-card .oc-id { font-size:12px; color:#999; }
  .order-status { font-size:12px; padding:3px 10px; border-radius:12px; font-weight:600; }
  .order-status.pending { background:#fff3cd; color:#b8860b; }
  .order-status.paid { background:#d4edda; color:#155724; }
  .order-status.shipped { background:#cce5ff; color:#004085; }
  .order-card .oc-products { font-size:13px; color:#555; line-height:1.8; margin-bottom:8px; }
  .order-card .oc-total { font-size:18px; font-weight:700; color:var(--red); text-align:right; }
  .order-card .oc-actions { display:flex; gap:8px; margin-top:10px; }
  .btn-sm { padding:8px 18px; border-radius:18px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; letter-spacing:1px; transition:all .2s; }
  .btn-sm.gold { background:var(--gold); color:#fff; border:none; }
  .btn-sm.white { background:#fff; color:#666; border:1px solid #ddd; }
  .settings-item { background:#fff; margin:0 16px 12px; border-radius:12px; padding:18px; box-shadow:0 2px 8px rgba(0,0,0,.04); }
  .settings-item label { display:block; font-size:13px; font-weight:600; color:#888; margin-bottom:6px; }
  .toast { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,.8); color:#fff; padding:10px 24px; border-radius:20px; font-size:13px; z-index:300; pointer-events:none; animation:toastIn .3s ease; }
  @keyframes toastIn { from{opacity:0;transform:translate(-50%,-50%) scale(.8);} }
  .empty { text-align:center; padding:50px; color:#ccc; }
  .empty .icon { font-size:50px; margin-bottom:8px; }
  .bottom-nav { flex-shrink:0; position:sticky; bottom:0; z-index:40; background:#fff; border-top:1px solid #eee; display:flex; padding:6px 0; padding-bottom:max(6px,env(safe-area-inset-bottom)); }
  .bottom-nav .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; padding:8px 0; cursor:pointer; color:#999; transition:color .2s; font-size:11px; font-weight:500; gap:4px; position:relative; }
  .bottom-nav .nav-item .ni-icon { font-size:22px; }
  .bottom-nav .nav-item.active { color:var(--gold); }

// ============ CSS 瓶身渲染 ============
function renderBottle(p, large) {
  var cls = 'bottle-wrap b-' + (p.b||'maotai') + (large ? ' large' : '');
  var capStyle = '';
  if (p.b === 'beer') capStyle = 'background:' + p.bcolor;
  else if (p.b === 'gift') capStyle = 'background:linear-gradient(180deg,#ffd700,#c8a020)';
  var labelStyle = '';
  if (p.b === 'beer' || p.b === 'sake') labelStyle = 'background:' + p.bcolor + ';color:' + (p.btext||'#fff');
  else if (p.b === 'gift') labelStyle = 'background:rgba(0,0,0,.4);color:#ffd700';
  return '<div class="'+cls+'">'
    + '<div class="bottle-cap" style="'+capStyle+'"></div>'
    + '<div class="bottle-neck"></div>'
    + '<div class="bottle-body"><div class="bottle-label" style="'+labelStyle+'">'
    + '<span class="bl-brand" style="color:'+(p.btext||'')+'">'+escHtml(p.brand)+'</span>'
    + '<span class="bl-type">'+escHtml(p.btype)+'</span>'
    + '<span class="bl-alc">'+p.alc+'</span>'
    + '</div></div></div>';
}

function bottleBg(p) {
  var m = {
    maotai:'linear-gradient(135deg,#faf8f5,#e8ddd0)',
    wuliangye:'linear-gradient(135deg,#faf8fa,#e8e0f0)',
    jiannanchun:'linear-gradient(135deg,#f5f5fa,#e0e0ee)',
    langjiu:'linear-gradient(135deg,#faf5f5,#e8d8d8)',
    wine:'linear-gradient(135deg,#1a1020,#2d1528)',
    spirit:'linear-gradient(135deg,#1a1408,#2d1f10)',
    beer:'linear-gradient(135deg,#f7f3e0,#e8d880)',
    sake:'linear-gradient(135deg,#f5f0f8,#e0d5e8)',
    gift:'linear-gradient(135deg,#1a0a0a,#2d1010)'
  };
  return m[p.b] || 'linear-gradient(135deg,#f5f1eb,#e0d8cc)';
}

// ============ 导航 ============
function navigateTo(page){
  pageHistory.push(page);
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  var el=document.getElementById('page-'+page); if(el) el.classList.add('active');
  var bb=document.getElementById('backBtn'), t=document.getElementById('navTitle');
  if(page==='home'){ bb.style.display='none'; t.textContent='酒 巷'; }
  else { bb.style.display='block'; var titles={checkout:'确认订单',orders:'我的订单',settings:'店铺设置'}; t.textContent=titles[page]||''; }
  document.querySelectorAll('.bottom-nav .nav-item').forEach(function(n){n.classList.remove('active');});
  var m={home:'nav-home',orders:'nav-orders',settings:'nav-settings'};
  var a=m[page]; if(a) document.getElementById(a).classList.add('active');
  if(page==='checkout') renderCheckout();
  if(page==='orders') renderOrders();
  if(page==='settings') renderSettings();
  if(page==='home'){ renderHome(); document.getElementById('page-home').scrollIntoView(); }
}
function goBack(){
  if(pageHistory.length<=1) return;
  pageHistory.pop(); var prev=pageHistory[pageHistory.length-1]; pageHistory.pop(); navigateTo(prev);
}

// ============ 首页 ============
function renderHome(filter){
  if(filter!==undefined) currentFilter=filter;
  var list=getFiltered();
  var cats=['全部','白酒','红酒','啤酒','洋酒','清酒','礼盒'];
  var hotIds=[1,2,3,10,15,20,24,27];
  var hot=products.filter(function(p){return hotIds.indexOf(p.id)!==-1;});
  var html='<div class="banner"><div class="banner-text"><div class="b-title">陈年佳酿<br>岁月留香</div><div class="b-sub">精选全球好酒 · 正品保障 · 官网半价</div></div></div>';
  html+='<div class="cats">';
  cats.forEach(function(c){html+='<div class="cat-chip'+(c===currentCat?' active':'')+'" onclick="switchCat(\''+c+'\')">'+(c==='全部'?'🔥 全部':c)+'</div>';});
  html+='</div>';
  if(currentCat==='全部'&&!currentFilter){
    html+='<div class="sec-title">🔥 热销推荐</div><div class="grid">';
    hot.forEach(function(p){html+=productCard(p);});
    html+='</div><div class="sec-title">📦 全部美酒</div>';
  }
  if(list.length===0){html+='<div class="empty"><div class="icon">🍷</div>没有找到相关商品</div>';}
  else{html+='<div class="grid">';list.forEach(function(p){html+=productCard(p);});html+='</div>';}
  html+='<div style="text-align:center;padding:30px 20px;color:#ccc;font-size:12px;">— 美酒虽好 请勿贪杯 —</div>';
  document.getElementById('homeContent').innerHTML=html;
}
function getFiltered(){
  return products.filter(function(p){
    if(currentCat!=='全部'&&p.cat!==currentCat) return false;
    if(currentFilter&&p.name.indexOf(currentFilter)===-1&&p.cat.indexOf(currentFilter)===-1) return false;
    return true;
  });
}
function switchCat(cat){currentCat=cat;renderHome();}

function productCard(p){
  return '<div class="product-card" onclick="openDetail('+p.id+')">'
    +'<div class="img" style="background:'+bottleBg(p)+';">'+renderBottle(p,false)
    +(p.tag?'<span class="tag">'+p.tag+'</span>':'')+'</div>'

    +'<div class="meta">'+p.alc+' · '+p.vol+' · 已售'+fmtNum(p.sales)+'</div>'
    +'<div class="price-row"><span class="price"><span style="font-size:14px;">¥</span>'+p.price+'</span>'
    +'<button class="add-btn" onclick="event.stopPropagation();addToCart('+p.id+')">+</button></div></div></div>';

function openDetail(id){

// ============ 购物车 ============
function addToCart(id){
  var existing=cart.find(function(c){return c.id===id;});
  if(existing){existing.qty++;}
  else{var p=products.find(function(p){return p.id===id;});if(p)cart.push({id:p.id,name:p.name,price:p.price,b:p.b,brand:p.brand,btype:p.btype,bcolor:p.bcolor,btext:p.btext,alc:p.alc,qty:1});}
  updateCartBadge();toast('已加入购物车');
}
function removeFromCart(id){cart=cart.filter(function(c){return c.id!==id;});updateCartBadge();renderCart();}
function changeQty(id,d){var item=cart.find(function(c){return c.id===id;});if(!item)return;item.qty+=d;if(item.qty<=0){removeFromCart(id);return;}updateCartBadge();renderCart();}
function updateCartBadge(){
  var count=cart.reduce(function(s,c){return s+c.qty;},0);
  document.getElementById('cartBadge').textContent=count;document.getElementById('cartBadge').style.display=count>0?'flex':'none';
  var nb=document.getElementById('navCartBadge');if(nb){nb.textContent=count;nb.style.display=count>0?'flex':'none';}
}
function toggleCart(){openCart();}
function openCart(){renderCart();document.getElementById('cartOverlay').classList.add('open');}
function closeCart(){document.getElementById('cartOverlay').classList.remove('open');}
function renderCart(){
  var total=cart.reduce(function(s,c){return s+c.price*c.qty;},0);
  var html='<div class="cart-head"><span>🛒 购物车 ('+cart.length+'件)</span><button style="background:none;border:none;font-size:18px;cursor:pointer;" onclick="closeCart()">✕</button></div><div class="cart-items">';
  if(cart.length===0){html+='<div class="empty"><div class="icon">🛒</div>购物车是空的</div>';}
  else{cart.forEach(function(c){
    html+='<div class="cart-item"><div class="ci-img">'+renderBottle(c,false)+'</div>';
    html+='<div class="ci-info"><div class="ci-name">'+escHtml(c.name)+'</div><div class="ci-price">¥'+(c.price*c.qty)+'</div></div>';
    html+='<div class="qty-ctrl"><button onclick="changeQty('+c.id+',-1)">-</button><span>'+c.qty+'</span><button onclick="changeQty('+c.id+',1)">+</button></div></div>';
  });}
  html+='</div><div class="cart-foot"><div class="total"><span>合计</span><span class="amt">¥'+total+'</span></div>';
  html+='<button class="btn-checkout" onclick="closeCart();goCheckout()"'+(cart.length===0?' disabled':'')+'>去结算</button></div>';
  document.getElementById('cartDrawer').innerHTML=html;
}
function buyNow(){closeDetail();goCheckout();}
function goCheckout(){if(cart.length===0){toast('购物车是空的');return;}navigateTo('checkout');}

// ============ 结算 ============
function renderCheckout(){
  if(cart.length===0){navigateTo('home');toast('购物车是空的');return;}
  var total=cart.reduce(function(s,c){return s+c.price*c.qty;},0);
  loadSettings();paymentProofData=null;paymentMethod='wechat';
  var html='<div class="checkout-sec"><div class="sec-label">📍 收货信息</div>';
  html+='<input class="form-input" id="chkName" placeholder="收货人姓名">';
  html+='<input class="form-input" id="chkPhone" placeholder="手机号码">';
  html+='<textarea class="form-input" id="chkAddr" placeholder="详细地址" rows="2" style="resize:none;"></textarea></div>';
  html+='<div class="checkout-sec"><div class="sec-label">📦 商品清单</div>';
  cart.forEach(function(c){html+='<div class="order-item"><span style="font-size:24px;">🍾</span><span class="oi-name">'+escHtml(c.name)+'</span><span>×'+c.qty+'</span><span class="oi-price">¥'+(c.price*c.qty)+'</span></div>';});
  html+='<div style="text-align:right;padding-top:10px;font-size:20px;font-weight:900;color:var(--red);">合计 ¥'+total+'</div></div>';
  html+='<div class="checkout-sec"><div class="sec-label">💳 支付方式</div>';
  html+='<div class="pay-option active" onclick="selectPay(\'wechat\')" id="pay-wechat"><div class="pay-radio"></div><span class="pay-icon">💚</span><span class="pay-label">微信支付</span></div>';
  html+='<div class="pay-option" onclick="selectPay(\'alipay\')" id="pay-alipay"><div class="pay-radio"></div><span class="pay-icon">💙</span><span class="pay-label">支付宝</span></div></div>';
  html+='<div class="checkout-sec qr-section"><div class="qr-amount">请支付 ¥'+total+'</div><div class="qr-box" id="qrBox">';
  var qrUrl=paymentMethod==='wechat'?settings.wechatQr:settings.alipayQr;
  if(qrUrl){html+='<img src="'+qrUrl+'" alt="付款码" onerror="this.innerHTML=\'<div class=no-qr>加载失败</div>\'">';}
  else{html+='<div class="no-qr">尚未设置'+(paymentMethod==='wechat'?'微信':'支付宝')+'收款码<br>👆 点底部"设置"上传</div>';}
  html+='</div><div class="qr-hint">请使用'+(paymentMethod==='wechat'?'微信':'支付宝')+'扫码付款</div>';
  html+='<div class="upload-box" onclick="document.getElementById(\'proofInput\').click()"><img class="preview-img" id="proofPreview"><div class="upload-text" id="uploadText">📎 点击上传付款截图</div></div>';
  html+='<input type="file" id="proofInput" accept="image/*" style="display:none" onchange="handleProofUpload(event)"></div>';
  html+='<div style="padding:0 16px 30px;"><button class="btn-confirm" onclick="submitOrder()">确认下单</button></div>';
  document.getElementById('checkoutContent').innerHTML=html;
  var addr={};try{addr=JSON.parse(localStorage.getItem('jiuxiang_addr'))||{};}catch(e){}
  document.getElementById('chkName').value=addr.name||'';document.getElementById('chkPhone').value=addr.phone||'';document.getElementById('chkAddr').value=addr.addr||'';
}
function selectPay(method){
  paymentMethod=method;
  document.querySelectorAll('.pay-option').forEach(function(o){o.classList.remove('active');});
  document.getElementById('pay-'+method).classList.add('active');
  var qrUrl=method==='wechat'?settings.wechatQr:settings.alipayQr;
  var qb=document.getElementById('qrBox');
  if(qb){qb.innerHTML=qrUrl?'<img src="'+qrUrl+'" alt="付款码">':'<div class="no-qr">尚未设置'+(method==='wechat'?'微信':'支付宝')+'收款码<br>👆 点底部"设置"上传</div>';}
  document.getElementById('proofPreview').style.display='none';document.getElementById('uploadText').style.display='';paymentProofData=null;
}
function handleProofUpload(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){paymentProofData=ev.target.result;var pv=document.getElementById('proofPreview');pv.src=paymentProofData;pv.style.display='block';document.getElementById('uploadText').style.display='none';};
  reader.readAsDataURL(file);
}
function submitOrder(){
  var name=document.getElementById('chkName').value.trim(),phone=document.getElementById('chkPhone').value.trim(),addr=document.getElementById('chkAddr').value.trim();
  if(!name||!phone||!addr){toast('请填写完整的收货信息');return;}
  localStorage.setItem('jiuxiang_addr',JSON.stringify({name:name,phone:phone,addr:addr}));
  var total=cart.reduce(function(s,c){return s+c.price*c.qty;},0);
  var order={id:'JX'+Date.now().toString(36).toUpperCase(),items:JSON.parse(JSON.stringify(cart)),total:total,paymentMethod:paymentMethod,paymentProof:paymentProofData,address:{name:name,phone:phone,addr:addr},status:'pending',createdAt:new Date().toISOString()};
  var orders=getOrders();orders.unshift(order);saveOrders(orders);
  cart=[];updateCartBadge();toast('下单成功！');navigateTo('orders');
}

// ============ 订单 ============
function renderOrders(){
  var orders=getOrders(),html='';
  if(orders.length===0){html='<div class="empty"><div class="icon">📋</div>暂无订单</div>';}
  else{orders.forEach(function(o,i){
    var st={pending:'待确认',paid:'已付款',shipped:'已发货'};
    var ih=o.items.map(function(it){return escHtml(it.name)+' ×'+it.qty;}).join('<br>');
    html+='<div class="order-card"><div class="oc-head"><span class="oc-id">'+o.id+'</span><span class="order-status '+o.status+'">'+(st[o.status]||o.status)+'</span></div>';
    html+='<div class="oc-products">'+ih+'</div><div class="oc-total">¥'+o.total+'</div>';
    html+='<div style="font-size:11px;color:#bbb;margin-top:4px;">'+o.paymentMethod+' · '+new Date(o.createdAt).toLocaleString('zh-CN')+'</div>';
    if(o.paymentProof) html+='<div style="margin-top:8px;"><img src="'+o.paymentProof+'" style="width:80px;border-radius:6px;border:1px solid #eee;" onclick="window.open(this.src)"></div>';
    html+=(o.status==='pending'?'<div class="oc-actions"><button class="btn-sm gold" onclick="markPaid('+i+')">标记已付款</button><button class="btn-sm white" onclick="deleteOrder('+i+')">删除</button></div>':(o.status==='paid'?'<div class="oc-actions"><button class="btn-sm gold" onclick="markShipped('+i+')">标记已发货</button></div>':''));
    html+='</div>';
  });}
  document.getElementById('ordersContent').innerHTML=html;
}
function markPaid(i){updateOrderStatus(i,'paid');}
function markShipped(i){updateOrderStatus(i,'shipped');}
function deleteOrder(i){if(!confirm('确定删除？'))return;var o=getOrders();o.splice(i,1);saveOrders(o);renderOrders();toast('已删除');}
function updateOrderStatus(i,s){var o=getOrders();if(i>=0&&i<o.length){o[i].status=s;saveOrders(o);renderOrders();toast('已更新');}}

// ============ 设置 ============
function renderSettings(){
  loadSettings();
  var html='<div class="settings-item"><label>店铺名称</label><input class="form-input" id="setName" value="'+escAttr(settings.shopName)+'" onchange="updateSetting(\'shopName\',this.value)"></div>';
  html+='<div class="settings-item"><label>微信收款码 URL</label><input class="form-input" id="setWxQr" value="'+escAttr(settings.wechatQr)+'" onchange="updateSetting(\'wechatQr\',this.value)" placeholder="https://..."></div>';
  html+='<div class="settings-item"><label>支付宝收款码 URL</label><input class="form-input" id="setAliQr" value="'+escAttr(settings.alipayQr)+'" onchange="updateSetting(\'alipayQr\',this.value)" placeholder="https://..."></div>';
  html+='<div class="settings-item"><label>客服电话</label><input class="form-input" id="setPhone" value="'+escAttr(settings.contactPhone)+'" onchange="updateSetting(\'contactPhone\',this.value)"></div>';
  html+='<div class="settings-item"><label>购买须知</label><textarea class="form-input" id="setNotice" rows="3" onchange="updateSetting(\'notice\',this.value)" style="resize:none;">'+escHtml(settings.notice)+'</textarea></div>';
  html+='<div style="text-align:center;padding:20px;"><button class="btn-sm gold" onclick="resetAllData()">🗑 重置全部数据</button></div>';
  document.getElementById('settingsContent').innerHTML=html;
}
function updateSetting(k,v){settings[k]=v;saveSettings();}
function resetAllData(){if(!confirm('确定清空所有数据？'))return;['jiuxiang_settings','jiuxiang_orders','jiuxiang_addr'].forEach(function(k){localStorage.removeItem(k);});cart=[];updateCartBadge();loadSettings();toast('已重置');navigateTo('home');}

// ============ 工具 ============
function escHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function escAttr(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtNum(n){return n>=10000?(n/10000).toFixed(1)+'万':n;}
function toast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.getElementById('app').appendChild(t);setTimeout(function(){t.remove();},1500);}

document.getElementById('nav-home').addEventListener('click',function(){pageHistory=['home'];navigateTo('home');});
document.getElementById('nav-orders').addEventListener('click',function(){pageHistory=['home','orders'];navigateTo('orders');});
document.getElementById('nav-settings').addEventListener('click',function(){pageHistory=['home','settings'];navigateTo('settings');});

loadSettings();
renderHome();
</script>
</body>
</html>
